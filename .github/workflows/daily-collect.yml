name: Daily knowledge collection

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-knowledge-collection
  cancel-in-progress: false

defaults:
  run:
    working-directory: week2

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: week2/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect articles
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate articles
        run: |
          python .codex/hooks/scripts/validate_json.py knowledge/articles/*.json
          python .codex/hooks/scripts/check_quality.py knowledge/articles/*.json

      - name: Commit and push new articles
        shell: bash
        run: |
          article_count=$(git status --porcelain --untracked-files=all -- knowledge/articles | wc -l | tr -d ' ')

          if [ "$article_count" -eq 0 ]; then
            echo "No new articles; skipping commit."
            exit 0
          fi

          collection_date=$(date -u +%F)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- knowledge/articles knowledge/raw knowledge/checkpoint.json
          git commit -m "chore: collect ${article_count} articles on ${collection_date}"
          git push
